<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    background: #000000;
    color: #cdd6f4;
  }
  h1 { margin-bottom: 10px; }
  #status {
    font-size: 1.2rem;
    margin-bottom: 15px;
    height: 1.5rem;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap: 6px;
    background: #45475a;
    padding: 6px;
    border-radius: 8px;
  }
  .cell {
    background: #313244;
    border: none;
    border-radius: 6px;
    font-size: 2.5rem;
    font-weight: bold;
    color: #cdd6f4;
    cursor: pointer;
    transition: background 0.15s;
  }
  .cell:hover:not(:disabled) { background: #585b70; }
  .cell:disabled { cursor: not-allowed; }
  .x { color: #89b4fa; }
  .o { color: #f38ba8; }
  .win { background: #a6e3a1 !important; color: #1e1e2e; }
  #reset {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 1rem;
    background: #89b4fa;
    color: #1e1e2e;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }
  #reset:hover { background: #b4befe; }
</style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">Tour de X</div>
  <div id="board"></div>
  <button id="reset">Rejouer</button>

<script>
  const board = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const resetBtn = document.getElementById('reset');

  let cells = Array(9).fill('');
  let currentPlayer = 'X';
  let gameOver = false;

  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  function render() {
    board.innerHTML = '';
    cells.forEach((value, i) => {
      const btn = document.createElement('button');
      btn.className = 'cell' + (value ? ' ' + value.toLowerCase() : '');
      btn.textContent = value;
      btn.disabled = !!value || gameOver;
      btn.addEventListener('click', () => play(i, btn));
      board.appendChild(btn);
    });
  }

  function play(i) {
    if (cells[i] || gameOver) return;
    cells[i] = currentPlayer;
    const winLine = checkWin();
    if (winLine) {
      gameOver = true;
      statusEl.textContent = `${currentPlayer} a gagné !`;
      render();
      [...board.children].forEach((c, idx) => {
        if (winLine.includes(idx)) c.classList.add('win');
      });
      return;
    }
    if (cells.every(c => c)) {
      gameOver = true;
      statusEl.textContent = 'Match nul !';
      render();
      return;
    }
    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    statusEl.textContent = `Tour de ${currentPlayer}`;
    render();
  }

  function checkWin() {
    for (const line of wins) {
      const [a, b, c] = line;
      if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
        return line;
      }
    }
    return null;
  }

  function reset() {
    cells = Array(9).fill('');
    currentPlayer = 'X';
    gameOver = false;
    statusEl.textContent = 'Tour de X';
    render();
  }

  resetBtn.addEventListener('click', reset);
  render();
</script>
</body>
</html>
